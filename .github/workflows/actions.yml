name: CI Pipeline 

on:
  push: 
    branches: [ main ] 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4 
      - uses: docker/login-action@v2
        
      - name: Run a one-line script
        run: echo Hello, world!
      - name: gogogo
        run: docker build -t ghcr.io/StepNine/Devops/myapp:latest 
      - name: final
        run: docker push -t ghcr.io/StepNine/Devops/myapp:latest
        
